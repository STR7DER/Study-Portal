<!DOCTYPE html>
<html>
<head>
  <title>Game Hub</title>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .game-container {
      margin-top: 40px;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
    }

    button:hover {
      background: #444;
    }

    iframe {
      margin-top: 20px;
      border: none;
    }
  </style>
</head>

<body>

<div class="game-container">

  <!-- Doom -->
  <button onclick="loadGame('https://html-classic.itch.zone/html/7204900/index.html?v=1732313664')">
    Doom
  </button>

  <!-- Fnaf (8bit) -->
  <button onclick="loadGame('https://html-classic.itch.zone/html/15923602/index.html')">
    Fnaf (8bit)
  </button>

  <!-- UltraKill -->
  <button onclick="loadGame('https://html-classic.itch.zone/html/15139480/ultrakill/index.html')">
    UltraKill
  </button>

</div>

<iframe id="gameFrame" width="900" height="500"></iframe>

<script>
function loadGame(url) {
  document.getElementById('gameFrame').src = url;
}

// Panic key (press ESC to switch to Google)
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    window.location.href = "https://google.com";
  }
});
</script>

</body>
</html>
